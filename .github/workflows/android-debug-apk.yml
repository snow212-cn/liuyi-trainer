name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --build-cache --parallel --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: liuyi-trainer-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish debug APK to Releases
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Liuyi Trainer Debug APK
          body: |
            自动更新的调试版 APK 下载页。

            仓库为公开状态时，可下载此处的 APK，不需要登录 GitHub。
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: app/build/outputs/apk/debug/*.apk

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: liuyi-trainer-build-reports
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
          if-no-files-found: ignore
