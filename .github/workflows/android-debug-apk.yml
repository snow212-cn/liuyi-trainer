name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "APK build mode"
        required: true
        default: release
        type: choice
        options:
          - release
          - migration
          - debug
  push:
    branches:
      - main
      - develop
      - develop1
    tags:
      - "v*"
    paths:
      - ".github/workflows/android-debug-apk.yml"
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
  pull_request:
    paths:
      - ".github/workflows/android-debug-apk.yml"
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/build-tools/36.0.0
            ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools
            ${{ env.ANDROID_SDK_ROOT }}/licenses
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/platforms/android-36
            ~/.android/cache
          key: ${{ runner.os }}-android-sdk-36.0.0-v1

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Select build variant
        id: build_variant
        shell: bash
        run: |
          requested_mode="${{ github.event.inputs.build_mode }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            requested_mode="release"
          fi
          if [[ "${GITHUB_REF}" == refs/heads/develop1 ]]; then
            requested_mode="debug"
          fi
          if [ -z "${requested_mode}" ]; then
            requested_mode="release"
          fi

          echo "Requested build mode: ${requested_mode}"

          has_signing="false"
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            has_signing="true"
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${GITHUB_WORKSPACE}/ci-signing.jks"
          fi

          version_code="${{ github.run_number }}"
          version_name="0.1.${{ github.run_number }}"
          prerelease="true"
          make_latest="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_name="${GITHUB_REF_NAME}"
            tag_version="${tag_name#v}"
            version_name="${tag_version}"
            if [ "${has_signing}" != "true" ]; then
              echo "Tag builds require signing secrets."
              exit 1
            fi
            if [[ "${tag_name}" == *-* ]]; then
              prerelease="true"
              make_latest="false"
            else
              prerelease="false"
              make_latest="true"
            fi
          fi

          if [ "${requested_mode}" = "migration" ]; then
            if [ "${has_signing}" != "true" ]; then
              echo "Migration build requires signing secrets."
              exit 1
            fi
            echo "gradle_task=:app:assembleMigration" >> "${GITHUB_OUTPUT}"
            echo "artifact_name=liuyi-trainer-migration-apk" >> "${GITHUB_OUTPUT}"
            echo "apk_glob=app/build/outputs/apk/migration/*.apk" >> "${GITHUB_OUTPUT}"
            echo "release_tag=migration-latest" >> "${GITHUB_OUTPUT}"
            echo "release_name=Liuyi Trainer Migration APK" >> "${GITHUB_OUTPUT}"
            echo "release_body=自动更新的数据迁移版 APK 下载页。该包使用正式签名，但临时启用了 debuggable 以支持 adb run-as 数据恢复。" >> "${GITHUB_OUTPUT}"
            echo "expect_debuggable=true" >> "${GITHUB_OUTPUT}"
          elif [ "${requested_mode}" = "release" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              echo "gradle_task=:app:assembleRelease" >> "${GITHUB_OUTPUT}"
              echo "artifact_name=liuyi-trainer-release-apk" >> "${GITHUB_OUTPUT}"
              echo "apk_glob=app/build/outputs/apk/release/*.apk" >> "${GITHUB_OUTPUT}"
              echo "release_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              echo "release_name=Liuyi Trainer ${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              echo "release_body=正式版本 APK 下载页。" >> "${GITHUB_OUTPUT}"
              echo "expect_debuggable=false" >> "${GITHUB_OUTPUT}"
            elif [ "${has_signing}" = "true" ]; then
              echo "gradle_task=:app:assembleRelease" >> "${GITHUB_OUTPUT}"
              echo "artifact_name=liuyi-trainer-release-apk" >> "${GITHUB_OUTPUT}"
              echo "apk_glob=app/build/outputs/apk/release/*.apk" >> "${GITHUB_OUTPUT}"
              echo "release_tag=stable-latest" >> "${GITHUB_OUTPUT}"
              echo "release_name=Liuyi Trainer Stable APK" >> "${GITHUB_OUTPUT}"
              echo "release_body=自动更新的稳定签名 APK 下载页。" >> "${GITHUB_OUTPUT}"
              echo "expect_debuggable=false" >> "${GITHUB_OUTPUT}"
            else
              echo "Requested release build, but signing secrets are missing. Falling back to debug."
              echo "gradle_task=:app:assembleDebug" >> "${GITHUB_OUTPUT}"
              echo "artifact_name=liuyi-trainer-debug-apk" >> "${GITHUB_OUTPUT}"
              echo "apk_glob=app/build/outputs/apk/debug/*.apk" >> "${GITHUB_OUTPUT}"
              echo "release_tag=debug-latest" >> "${GITHUB_OUTPUT}"
              echo "release_name=Liuyi Trainer Debug APK" >> "${GITHUB_OUTPUT}"
              echo "release_body=自动更新的调试版 APK 下载页。由于未配置固定签名，调试包会使用独立包名 com.liuyi.trainer.debug。" >> "${GITHUB_OUTPUT}"
              echo "expect_debuggable=true" >> "${GITHUB_OUTPUT}"
            fi
          elif [ "${requested_mode}" = "debug" ]; then
            echo "gradle_task=:app:assembleDebug" >> "${GITHUB_OUTPUT}"
            echo "artifact_name=liuyi-trainer-debug-apk" >> "${GITHUB_OUTPUT}"
            echo "apk_glob=app/build/outputs/apk/debug/*.apk" >> "${GITHUB_OUTPUT}"
            echo "release_tag=debug-latest" >> "${GITHUB_OUTPUT}"
            echo "release_name=Liuyi Trainer Debug APK" >> "${GITHUB_OUTPUT}"
            echo "release_body=自动更新的调试版 APK 下载页。由于未配置固定签名，调试包会使用独立包名 com.liuyi.trainer.debug。" >> "${GITHUB_OUTPUT}"
            echo "expect_debuggable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Unknown build mode: ${requested_mode}"
            exit 1
          fi

          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "make_latest=${make_latest}" >> "${GITHUB_OUTPUT}"

      - name: Build APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/ci-signing.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew ${{ steps.build_variant.outputs.gradle_task }} --build-cache --stacktrace -PANDROID_VERSION_CODE=${{ steps.build_variant.outputs.version_code }} -PANDROID_VERSION_NAME=${{ steps.build_variant.outputs.version_name }}

      - name: Prepare APK package
        id: package_apk
        shell: bash
        run: |
          apk_path=$(find app/build/outputs/apk -name '*.apk' | head -n 1)
          if [ -z "${apk_path}" ]; then
            echo "No APK found after build"
            exit 1
          fi

          short_sha="${GITHUB_SHA::7}"
          version_code="${{ steps.build_variant.outputs.version_code }}"
          build_mode="${{ github.event.inputs.build_mode }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            build_mode="release"
          fi
          if [[ "${GITHUB_REF}" == refs/heads/develop1 ]]; then
            build_mode="debug"
          fi
          if [ -z "${build_mode}" ]; then
            build_mode="release"
          fi

          packaged_dir="${GITHUB_WORKSPACE}/packaged-apk"
          mkdir -p "${packaged_dir}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            artifact_apk="${packaged_dir}/liuyi-trainer-${GITHUB_REF_NAME}-${short_sha}.apk"
            release_apk="${packaged_dir}/liuyi-trainer-${GITHUB_REF_NAME}.apk"
          else
            artifact_apk="${packaged_dir}/liuyi-trainer-${build_mode}-vc${version_code}-${short_sha}.apk"
            release_apk="${packaged_dir}/liuyi-trainer-${build_mode}-latest.apk"
          fi

          cp "${apk_path}" "${artifact_apk}"
          cp "${apk_path}" "${release_apk}"

          echo "artifact_apk_path=${artifact_apk}" >> "${GITHUB_OUTPUT}"
          echo "artifact_apk_name=$(basename "${artifact_apk}")" >> "${GITHUB_OUTPUT}"
          echo "release_apk_path=${release_apk}" >> "${GITHUB_OUTPUT}"
          echo "release_apk_name=$(basename "${release_apk}")" >> "${GITHUB_OUTPUT}"

      - name: Verify APK mode
        if: steps.build_variant.outputs.expect_debuggable != ''
        shell: bash
        run: |
          apk_path="${{ steps.package_apk.outputs.release_apk_path }}"
          if [ -z "${apk_path}" ]; then
            echo "No APK found for verification"
            exit 1
          fi
          echo "Verifying ${apk_path}"
          manifest_dump="$("${ANDROID_SDK_ROOT}/build-tools/36.0.0/aapt" dump xmltree "${apk_path}" AndroidManifest.xml)"
          if [ "${{ steps.build_variant.outputs.expect_debuggable }}" = "true" ]; then
            echo "${manifest_dump}" | grep -q 'A: android:debuggable' || {
              echo "Expected a debuggable APK, but android:debuggable is missing"
              exit 1
            }
          else
            echo "${manifest_dump}" | grep -q 'A: android:debuggable' && {
              echo "Expected a stable release APK, but android:debuggable is present"
              exit 1
            } || true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_variant.outputs.artifact_name }}
          path: ${{ steps.package_apk.outputs.artifact_apk_path }}
          if-no-files-found: error

      - name: Publish APK to Releases
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop1' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_variant.outputs.release_tag }}
          name: ${{ steps.build_variant.outputs.release_name }}
          body: |
            ${{ steps.build_variant.outputs.release_body }}

            版本名：`${{ steps.build_variant.outputs.version_name }}`
            构建编号：`${{ steps.build_variant.outputs.version_code }}`
            提交：`${{ github.sha }}`
            文件名：`${{ steps.package_apk.outputs.release_apk_name }}`

            仓库为公开状态时，可下载此处的 APK，不需要登录 GitHub。
          prerelease: ${{ steps.build_variant.outputs.prerelease }}
          make_latest: ${{ steps.build_variant.outputs.make_latest }}
          overwrite_files: true
          files: ${{ steps.package_apk.outputs.release_apk_path }}

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: liuyi-trainer-build-reports
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
          if-no-files-found: ignore
